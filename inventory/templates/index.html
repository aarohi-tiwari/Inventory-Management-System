<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Add / Edit Product</h2>

<form id="productForm">
    <input type="hidden" id="productId">
    <input class="form-control mb-2" placeholder="Name" id="name" required>
    <input class="form-control mb-2" placeholder="Price" id="price" required>
    <input class="form-control mb-2" placeholder="Brand" id="brand" required>
    <label class="form-label mb-0 small text-muted" for="category">Category</label>
    <select class="form-control mb-2" id="category" name="category" required></select>
    <input class="form-control mb-2" placeholder="Quantity" id="quantity" type="number" min="0" value="0">

    <button type="submit" class="btn btn-primary">Save</button>
</form>

<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">Add a category</h5>
        <input class="form-control mb-2" id="newCategoryTitle" placeholder="Title (e.g. Food, Kitchen Essentials)" maxlength="200">
        <button type="button" class="btn btn-outline-secondary btn-sm" id="btnAddCategory">Add category</button>
    </div>
</div>

<hr>

<h2>Search & Filter</h2>

<input class="form-control mb-2" placeholder="Search by name" id="search">
<input class="form-control mb-2" placeholder="Filter by brand" id="filterBrand">
<select class="form-control mb-2" id="filterCategory">
    <option value="">All categories</option>
</select>

<button type="button" class="btn btn-secondary mb-3" onclick="applyFilters()">Apply</button>
<hr>

<h2>Products</h2>

<table class="table">
    <thead>
        <tr>
            <th>Name</th><th>Price</th><th>Brand</th><th>Category</th><th>Qty</th><th>Actions</th>
        </tr>
    </thead>
    <tbody id="productList"></tbody>
</table>
<div class="d-flex justify-content-between align-items-center mt-3">
    <button type="button" class="btn btn-outline-primary" onclick="prevPage()">Prev</button>

    <span id="pageInfo">Page 1</span>

    <button type="button" class="btn btn-outline-primary" onclick="nextPage()">Next</button>
</div>

<script>
let currentPage = 1;
let totalPages = 1;
let limit = 5;
let editingId = null;
/** Latest products from API keyed by id (avoids broken onclick strings). */
let productById = {};

function applyFilters() {
    currentPage = 1;
    loadProducts();
}

function getCSRFToken() {
    return document.cookie
        .split('; ')
        .find(row => row.startsWith('csrftoken'))
        ?.split('=')[1];
}

function escHtml(text) {
    const d = document.createElement("div");
    d.textContent = text == null ? "" : String(text);
    return d.innerHTML;
}

async function loadCategories(preserveCategoryValue) {
    const previousFormCategory = preserveCategoryValue != null
        ? preserveCategoryValue
        : document.getElementById("category").value;

    const res = await fetch("/api/categories/");
    const data = await res.json();
    const cats = data.categories || [];

    let formOptions = `<option value="" disabled hidden selected>— Select a category —</option>`;
    let filterOptions = `<option value="">All categories</option>`;
    cats.forEach(cat => {
        const label = escHtml(cat.title);
        formOptions += `<option value="${escHtml(cat.id)}">${label}</option>`;
        filterOptions += `<option value="${escHtml(cat.id)}">${label}</option>`;
    });

    const categoryEl = document.getElementById("category");
    categoryEl.innerHTML = formOptions;
    document.getElementById("filterCategory").innerHTML = filterOptions;

    if (previousFormCategory && [...categoryEl.options].some(o => o.value === previousFormCategory)) {
        categoryEl.value = previousFormCategory;
    }
}

async function loadProducts() {
    const search = document.getElementById("search").value || "";
    const brand = document.getElementById("filterBrand").value || "";
    const category = document.getElementById("filterCategory").value || "";

    const url = `/api/products/list/?page=${currentPage}&limit=${limit}&search=${encodeURIComponent(search)}&brand=${encodeURIComponent(brand)}&category=${encodeURIComponent(category)}`;

    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
        alert("Error loading products: " + JSON.stringify(data));
        return;
    }

    totalPages = data.total_pages || 1;
    productById = {};

    let html = "";
    (data.products || []).forEach(p => {
        productById[p.id] = p;
        html += `<tr>
            <td>${escHtml(p.name)}</td>
            <td>${escHtml(p.price)}</td>
            <td>${escHtml(p.brand)}</td>
            <td>${escHtml(p.category_name || "")}</td>
            <td>${escHtml(p.quantity)}</td>
            <td>
                <button type="button" class="btn btn-warning btn-sm" data-edit-id="${escHtml(p.id)}">Edit</button>
                <button type="button" class="btn btn-danger btn-sm" data-delete-id="${escHtml(p.id)}">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("productList").innerHTML = html;

    document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${totalPages}`;
}

document.getElementById("productList").addEventListener("click", (e) => {
    const editBtn = e.target.closest("[data-edit-id]");
    if (editBtn) {
        const id = editBtn.getAttribute("data-edit-id");
        const p = productById[id];
        if (p) editProduct(p);
        return;
    }
    const delBtn = e.target.closest("[data-delete-id]");
    if (delBtn) {
        deleteProduct(delBtn.getAttribute("data-delete-id"));
    }
});

function nextPage() {
    if (currentPage < totalPages) {
        currentPage++;
        loadProducts();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        loadProducts();
    }
}

function editProduct(p) {
    editingId = p.id;

    document.getElementById("name").value = p.name || "";
    document.getElementById("price").value = p.price ?? "";
    document.getElementById("brand").value = p.brand || "";
    const cat = p.category || "";
    const categoryEl = document.getElementById("category");
    if (cat && [...categoryEl.options].some(o => o.value === cat)) {
        categoryEl.value = cat;
    } else {
        categoryEl.value = "";
    }
    document.getElementById("quantity").value = p.quantity != null ? p.quantity : 0;
}

async function deleteProduct(id) {
    if (!confirm("Do you want to delete this entry?")) return;

    const res = await fetch(`/api/products/delete/${id}/`, {
        method: "DELETE",
        headers: {
            "Content-Type": "application/json"
        }
    });

    const data = await res.json();
    console.log(data);

    loadProducts();
}

document.getElementById("productForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const priceRaw = document.getElementById("price").value;
    const qtyRaw = document.getElementById("quantity").value;
    const price = parseFloat(priceRaw);
    const quantity = qtyRaw === "" ? 0 : parseInt(qtyRaw, 10);

    const categoryVal = document.getElementById("category").value.trim();
    const payload = {
        name: document.getElementById("name").value.trim(),
        price: price,
        brand: document.getElementById("brand").value.trim(),
        category: categoryVal,
        quantity: Number.isFinite(quantity) ? quantity : 0
    };

    if (!Number.isFinite(payload.price)) {
        alert("Please enter a valid price.");
        return;
    }

    if (!payload.category) {
        alert("Please select a category (or add one below).");
        return;
    }

    let url = "/api/products/";
    let method = "POST";

    if (editingId) {
        url = `/api/products/${editingId}/`;
        method = "PUT";
    }

    const res = await fetch(url, {
        method: method,
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify(payload)
    });

    const result = await res.json();

    if (res.status >= 400) {
        alert("Error: " + JSON.stringify(result));
    } else {
        alert("Success!");
    }

    editingId = null;
    document.getElementById("productForm").reset();

    loadProducts();
    loadCategories();
});

document.getElementById("btnAddCategory").addEventListener("click", async () => {
    const title = document.getElementById("newCategoryTitle").value.trim();
    if (!title) {
        alert("Category title is required.");
        return;
    }

    const res = await fetch("/api/categories/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ title })
    });

    const result = await res.json();
    if (!res.ok) {
        alert("Could not add category: " + JSON.stringify(result));
        return;
    }

    document.getElementById("newCategoryTitle").value = "";

    const newId = result.id;
    await loadCategories(newId);
    if (newId) {
        document.getElementById("category").value = newId;
    }
    alert("Category added.");
});

// INIT
loadCategories().then(() => loadProducts());
</script>

</body>
</html>
